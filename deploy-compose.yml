#
# Port map / network intent
# - Host port 8000 -> `app:8000` for the internal staff site + FastAPI API
# - `postgres` is also bound to 127.0.0.1:5432 for local SIT/admin access only
# - Other containers in this stack reach the FastAPI app at `http://app:8000`
#
services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: fan-graphs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - fan_graphs_postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    image: fan-graphs
    container_name: fan-graphs-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      CMS_API_TOKEN: ${CMS_API_TOKEN}
      PUBLIC_CATALOGUE_SITE_URL: ${PUBLIC_CATALOGUE_SITE_URL:-http://customer_facing:8004}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data:/app/data:Z

  customer_facing:
    profiles: ["catalogue"]
    build:
      context: ./customer_facing
    image: vent-tech-catalogue
    container_name: vent-tech-catalogue
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      BACKEND_API_BASE_URL: ${PUBLIC_CATALOGUE_BACKEND_API_BASE_URL:-https://p2.bitrep.nz}
      PUBLIC_SITE_URL: ${PUBLIC_CATALOGUE_SITE_URL:-http://localhost:8004}
      SITE_NAME: ${PUBLIC_CATALOGUE_SITE_NAME:-Vent-tech catalogue}
      REQUEST_TIMEOUT_SECONDS: ${PUBLIC_CATALOGUE_REQUEST_TIMEOUT_SECONDS:-10}
      CATALOGUE_CACHE_PATH: ${PUBLIC_CATALOGUE_CACHE_PATH:-/tmp/vent-tech-catalogue-cache.json}
      CATALOGUE_REFRESH_INTERVAL_SECONDS: ${PUBLIC_CATALOGUE_REFRESH_INTERVAL_SECONDS:-300}
      CMS_API_TOKEN: ${CMS_API_TOKEN}

volumes:
  fan_graphs_postgres_data:
