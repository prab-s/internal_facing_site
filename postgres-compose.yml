services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: fan-graphs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fan_graphs
      POSTGRES_USER: fan_graphs_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - fan_graphs_postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fan_graphs_user -d fan_graphs"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  fan_graphs_postgres_data:
