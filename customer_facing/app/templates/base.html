<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo.title }}</title>
  <meta name="description" content="{{ seo.description }}">
  <link rel="canonical" href="{{ seo.canonical }}">
  <script>
    (function () {
      try {
        const storageKey = "customerFacingTheme";
        const storedTheme = window.localStorage.getItem(storageKey);
        const theme = storedTheme === "dark" ? "dark" : "light";
        document.documentElement.dataset.bsTheme = theme;
      } catch (_error) {
        document.documentElement.dataset.bsTheme = "light";
      }
    })();
  </script>
  <link rel="icon" type="image/png" href="/static/favicon.png">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/static/css/site.css">
</head>

<body>
  {% include "partials/nav.html" %}

  <main class="container site-shell py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer border-top mt-5 py-4">
    <div class="container site-shell small text-muted">
      {{ site_name }} · Product data, graphs, PDFs, and images are supplied by the catalogue API.
    </div>
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
  <script src="/static/js/finder.js?v=20260427"></script>
</body>
</html>
