      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="mainNav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-lg-auto">

          </li>
        {% endfor %}
      </ul>
    </div>

    <div class="nav-actions d-flex align-items-center ms-auto">

      </button>
