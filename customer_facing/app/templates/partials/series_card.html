<div class="card h-100 shadow-sm border-0">
  <div class="card-body">
    <h3 class="h5">
      <a class="stretched-link text-decoration-none" href="{{ series_url(series) }}">
        {{ series.name }}
      </a>
    </h3>

    <p class="text-muted small mb-2">
      {{ series.product_type_label }}
    </p>

    <p class="small mb-0">
      {{ series.product_count }} products
    </p>
  </div>
</div>
