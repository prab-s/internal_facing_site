<div class="card shadow-sm border-0">
  <div class="card-body">
    <h2 class="h5">Downloads</h2>

    {% if product is defined %}
      {% set pdf_url = product.product_online_pdf_url %}
    {% elif series is defined %}
      {% set pdf_url = series.series_online_pdf_url %}
    {% else %}
      {% set pdf_url = None %}
    {% endif %}

    {% if pdf_url %}
      <a class="btn btn-primary w-100" href="{{ media_url(pdf_url) }}" target="_blank" rel="noopener">
        Open Online PDF
      </a>
    {% else %}
      <p class="text-muted mb-0">No online PDF available.</p>
    {% endif %}
  </div>
</div>
