<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{series.name}} | Series PDF</title>
    <link rel="stylesheet" href="./template.css" />
  </head>
  <body class="series-template">
    <main class="sheet">
      <header class="hero">
        <div class="hero__main">
          <p class="eyebrow">{{series.product_type_label}}</p>
          <h1 class="hero__title">{{series.name}}</h1>
          <div class="richtext hero__description">{{series.description1_html}}</div>
        </div>
        <aside class="hero__summary">
          <div class="summary-card">
            <span class="summary-card__label">Template</span>
            <span class="summary-card__value">{{series.template_label}}</span>
          </div>
          <div class="summary-card">
            <span class="summary-card__label">Products</span>
            <span class="summary-card__value">{{series.product_count}}</span>
          </div>
          <div class="summary-card">
            <span class="summary-card__label">Graph rule</span>
            <span class="summary-card__value">{{series.graph_rule_label}}</span>
          </div>
        </aside>
      </header>

      <section class="panel panel--full">
        <h2 class="panel__title">Series Graph</h2>
        <div class="graph-frame">
          <img src="{{series.graph_image_url}}" alt="{{series.name}} series graph" class="graph-image" />
        </div>
      </section>

      <section class="panel panel--full">
        <h2 class="panel__title">Series Product Summary</h2>
        <div class="table-slot">
          {{series.products_summary_table}}
        </div>
      </section>

      <section class="panel panel--full">
        <h2 class="panel__title">Series Notes</h2>
        <div class="richtext">{{series.comments_html}}</div>
      </section>
    </main>
  </body>
</html>
